services:
  traefik:
    image: traefik:v3.0
    environment:
      - DOCKER_API_VERSION=1.54
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # optional Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - web

  geoserver:
    image: kartoza/geoserver
    container_name: geoserver
    environment:
      - GEOSERVER_ADMIN_USER=${GEOSERVER_ADMIN_USER:-admin}
      - GEOSERVER_ADMIN_PASSWORD=${GEOSERVER_ADMIN_PASSWORD:-admin}
      - GEOSERVER_PROXY_BASE_URL=${GEOSERVER_PROXY_BASE_URL:-http://localhost/geoserver}
      - GEOSERVER_CSRF_DISABLED=${GEOSERVER_CSRF_DISABLED:-true}
      - GEOSERVER_CSRF_WHITELIST=${GEOSERVER_CSRF_WHITELIST:-localhost}
      - PROXY_BASE_URL=${PROXY_BASE_URL:-http://localhost}
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # Route GeoServer under /geoserver
      - "traefik.http.routers.geoserver.rule=PathPrefix(`/geoserver`)"
      - "traefik.http.routers.geoserver.entrypoints=web"
      # Forward X-Forwarded-Proto header – set to 'https' only when Traefik
      # itself terminates TLS. For plain HTTP deployments remove this middleware
      # or change the value to 'http'.
      - "traefik.http.middlewares.forward-headers.headers.customrequestheaders.X-Forwarded-Proto=${TRAEFIK_PROTO:-http}"
      - "traefik.http.routers.geoserver.middlewares=forward-headers"
      # Internal port
      - "traefik.http.services.geoserver.loadbalancer.server.port=8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: geoserver-frontend
    networks:
      - web
    depends_on:
      - geoserver
    labels:
      - "traefik.enable=true"
      # Route the React app at the root path
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      # Lower priority than geoserver route so /geoserver still reaches GeoServer
      - "traefik.http.routers.frontend.priority=1"
      # Internal port served by nginx
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

networks:
  web:

volumes:
  geoserver_data:
